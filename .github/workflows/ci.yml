# CI mirrors local work: bootstrap installs, check validates. If it passes
# locally it passes here, and vice versa. The one divergence: buf and sqlc
# run as prebuilt binaries (same versions as go.mod) instead of `go tool`,
# because compiling them from source costs ~2 minutes on a cold Go cache.
#
# The job id below ("check") is also the required status check name enforced
# by the main branch ruleset (see docs/runbooks/github-branch-protection.md).
# Keep it a single job with no matrix so the reported check name stays
# exactly "check". `make smoke-test` runs as a later step of this same job
# (not a separate job) for the same reason: it needs docker, which
# ubuntu-latest already provides, and a failure here must fail the one
# required "check" status exactly like a `make check` failure does.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      # Prebuilt buf and sqlc. Versions must match the tool versions pinned
      # in go.mod (github.com/bufbuild/buf, github.com/sqlc-dev/sqlc).
      - uses: bufbuild/buf-action@91da6f6a1a2c877c182debad24ca0a8a9d848be7 # v1
        with:
          version: 1.71.0
          setup_only: true

      - uses: sqlc-dev/setup-sqlc@bac53b7fb28c039a6c7f5736fd1e89744021bdd6 # v5
        with:
          sqlc-version: "1.31.1"

      - run: make bootstrap
      - run: make check BUF=buf SQLC=sqlc
      - run: make smoke-test
