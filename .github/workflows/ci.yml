# CI mirrors local work exactly: bootstrap installs, check validates. If it
# passes locally it passes here, and vice versa. No extra commands.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: make bootstrap
      - run: make check
