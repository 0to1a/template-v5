version: v2
clean: true
plugins:
  - local:
      - go
      - tool
      - protoc-gen-go
    out: internal/gen
    opt: paths=source_relative
  - local:
      - go
      - tool
      - protoc-gen-connect-go
    out: internal/gen
    opt: paths=source_relative
  - local:
      - web/node_modules/.bin/protoc-gen-es
    out: web/src/lib/gen
    opt: target=ts
