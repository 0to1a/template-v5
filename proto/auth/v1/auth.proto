syntax = "proto3";

package auth.v1;

option go_package = "project/internal/gen/auth/v1;authv1";

// AuthService issues one-time login codes and exchanges verified codes for a
// bearer JWT. There is no self-registration: RequestLogin and SubmitLogin
// only ever operate on existing active users.
//
// Naming is fixed by docs/prds/001-initial-auth.md: RequestLogin/SubmitLogin.
// Do not introduce RequestOTP/VerifyOTP/VerifyLogin variants anywhere.
service AuthService {
  // RequestLogin always returns a generic response, whether or not the email
  // belongs to an active user, to prevent account enumeration. It never
  // creates a user.
  rpc RequestLogin(RequestLoginRequest) returns (RequestLoginResponse);

  // SubmitLogin checks the one-time code and, on success, issues an HS256
  // JWT as an HttpOnly session cookie (see PRD 017) rather than in the
  // response body. Unknown users or invalid codes return a generic
  // Unauthenticated error.
  rpc SubmitLogin(SubmitLoginRequest) returns (SubmitLoginResponse);

  // Logout clears the session cookie server-side. It is public (bypasses
  // the auth interceptor, see cmd/server/main.go's allowlist): clearing a
  // cookie needs no identity check, and it must still succeed for a caller
  // whose session already expired or was never valid.
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

message RequestLoginRequest {
  string email = 1;
}

message RequestLoginResponse {}

message SubmitLoginRequest {
  string email = 1;
  string code = 2;
}

// Empty: the session token travels only as an HttpOnly Set-Cookie header
// (see internal/auth/cookie.go), never in the response body.
message SubmitLoginResponse {}

message LogoutRequest {}

message LogoutResponse {}
